server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      default-filters:
        - RemoveRequestHeader=X-Authenticated-User,X-Authenticated-Role,X-Authenticated-UserId
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: medicine-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/medicines/**, /api/medicine/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**
        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/inventory/**
        - id: supplier-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/supplier/**
        - id: admin-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    com.medical.gateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: DEBUG

jwt:
  base64-secret: NTQ2NzU2NkI1OTcwMzM3MzM2NzYzOTc5MjQ0MjI2NDUyOTQ4NDA0RDYzNTE2NjU0NkE1NzZFNUE3MjM0NzUzNw== # Base64 encoded version of the previous 256-bit hex secret
  issuer: royal-medico-auth-service

eureka:
  client:
    enabled: false