server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: medicine-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/medicines/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    com.medical.gateway: INFO
    org.springframework.cloud.gateway: INFO

jwt:
  secret: 5367566B5970337336763979244226452948404D635166546A576E5A72347537

eureka:
  client:
    enabled: false